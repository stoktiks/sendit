name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-native:
    name: Build ${{ matrix.label }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            binary: sendit-linux-x86_64
          - os: macos-latest
            label: darwin-x86_64
            binary: sendit-darwin-x86_64
          - os: windows-latest
            label: windows-x86_64
            binary: sendit-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller
      - run: pip install -e .
      - run: pyinstaller --onefile --name "${{ matrix.binary }}" run.py
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.binary }}
          fail_on_unmatched_files: true

  build-arm64:
    name: Build linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build ARM64 binary
        run: |
          docker run --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            python:3.11-slim \
            bash -c "
              apt-get update && apt-get install -y --no-install-recommends gcc libc6-dev && \
              rm -rf /var/lib/apt/lists/* && \
              pip install pyinstaller && \
              pip install -e . && \
              pyinstaller --onefile --name sendit-linux-arm64 run.py
            "
      - uses: actions/upload-artifact@v4
        with:
          name: sendit-linux-arm64
          path: dist/sendit-linux-arm64
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/sendit-linux-arm64
          fail_on_unmatched_files: true

  build-zipapp:
    name: Build portable .pyz (all platforms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build zipapp
        run: |
          pip install -e .
          python -m zipapp . \
            --output sendit.pyz \
            --main sendit.cli:main \
            --compress \
            --info "sendit portable app - requires Python 3.8+"
      - uses: actions/upload-artifact@v4
        with:
          name: sendit-pyz
          path: sendit.pyz
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: sendit.pyz
          fail_on_unmatched_files: true
