name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller
      - run: pip install -e .
      - run: pyinstaller --onefile --name "sendit-${{ runner.os == 'Windows' && 'x86_64.exe' || runner.os == 'macOS' && 'darwin-x86_64' || 'linux-x86_64' }}" --paths . --add-data "sendit:sendit" run.py
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: sendit-${{ runner.os }}
          path: dist/sendit-*
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/sendit-*
