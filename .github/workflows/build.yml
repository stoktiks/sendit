name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-native:
    name: Build ${{ matrix.label }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: darwin
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller
      - run: pip install -e .
      - name: Build binary
        run: |
          arch=$(uname -m)
          case "$arch" in
            x86_64) suffix="x86_64" ;;
            aarch64|arm64) suffix="arm64" ;;
            *) suffix="$arch" ;;
          esac
          ext=""
          [ "${{ matrix.label }}" = "windows" ] && ext=".exe"
          pyinstaller --onefile --name "sendit-${{ matrix.label }}-$suffix$ext" run.py
        shell: bash
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/sendit-*
          fail_on_unmatched_files: true

  build-arm64:
    name: Build linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build ARM64 binary
        run: |
          docker run --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            python:3.11-slim \
            bash -c "
              apt-get update && apt-get install -y --no-install-recommends gcc libc6-dev && \
              rm -rf /var/lib/apt/lists/* && \
              pip install pyinstaller && \
              pip install -e . && \
              pyinstaller --onefile --name sendit-linux-arm64 run.py
            "
      - uses: actions/upload-artifact@v4
        with:
          name: sendit-linux-arm64
          path: dist/sendit-linux-arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/sendit-linux-arm64
          fail_on_unmatched_files: true

  build-zipapp:
    name: Build portable .pyz (all platforms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build zipapp
        run: |
          pip install -e .
          python -m zipapp . \
            --output sendit.pyz \
            --main sendit.cli:main \
            --compress
      - uses: softprops/action-gh-release@v2
        with:
          files: sendit.pyz
          fail_on_unmatched_files: true

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: sendit-linux-arm64
          path: sendit-android/app/src/main/assets/
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.2
        working-directory: sendit-android
      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: sendit-android
      - name: Sign APK
        run: |
          # Generate a debug keystore for now (CI build, not for production)
          keytool -genkey -v -keystore debug.keystore \
            -alias sendit -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=sendit, OU=sendit, O=sendit, L=Unknown, ST=Unknown, C=US"
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore debug.keystore -storepass android \
            app/build/outputs/apk/release/app-release-unsigned.apk sendit
          $ANDROID_HOME/build-tools/*/zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            sendit-android.apk
        working-directory: sendit-android
      - uses: softprops/action-gh-release@v2
        with:
          files: sendit-android/sendit-android.apk
          fail_on_unmatched_files: true
