name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-native:
    name: Build ${{ matrix.label }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: darwin
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller qrcode
      - run: pip install -e .
      - name: Build binaries (CLI + Web)
        run: |
          arch=$(uname -m)
          case "$arch" in
            x86_64) suffix="x86_64" ;;
            aarch64|arm64) suffix="arm64" ;;
            *) suffix="$arch" ;;
          esac
          ext=""
          [ "${{ matrix.label }}" = "windows" ] && ext=".exe"

          # CLI version
          pyinstaller --onefile --name "sendit-cli-${{ matrix.label }}-$suffix$ext" run.py

          # Web version (bundles qrcode)
          pyinstaller --onefile --hidden-import qrcode --name "sendit-web-${{ matrix.label }}-$suffix$ext" run_web.py
        shell: bash
      - uses: softprops/action-gh-release@v1
        with:
          files: dist/sendit-*
          fail_on_unmatched_files: true

  build-arm64:
    name: Build linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: arm64
      - name: Build ARM64 binaries (CLI + Web)
        run: |
          docker run --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            python:3.11-slim \
            bash -c "
              apt-get update && apt-get install -y --no-install-recommends gcc libc6-dev && \
              rm -rf /var/lib/apt/lists/* && \
              pip install pyinstaller qrcode && \
              pip install -e . && \
              pyinstaller --onefile --name sendit-cli-linux-arm64 run.py && \
              pyinstaller --onefile --hidden-import qrcode --name sendit-web-linux-arm64 run_web.py
            "
      - uses: actions/upload-artifact@v4
        with:
          name: sendit-web-linux-arm64
          path: dist/sendit-web-linux-arm64
      - uses: softprops/action-gh-release@v1
        with:
          files: dist/sendit-*
          fail_on_unmatched_files: true

  build-zipapp:
    name: Build portable .pyz (all platforms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build CLI zipapp
        run: |
          pip install -e .
          python -m zipapp . \
            --output sendit-cli.pyz \
            --main sendit.cli:main \
            --compress
      - name: Build Web zipapp (bundles qrcode)
        run: |
          BUILD_DIR=$(mktemp -d)
          cp -r sendit "$BUILD_DIR/sendit"
          pip install qrcode -t "$BUILD_DIR" --quiet
          cd "$BUILD_DIR"
          python -m zipapp . \
            --output /tmp/sendit-web.pyz \
            --main sendit.cli_web:main \
            --compress
          mv /tmp/sendit-web.pyz "$GITHUB_WORKSPACE/sendit-web.pyz"
          rm -rf "$BUILD_DIR"
      - uses: softprops/action-gh-release@v1
        with:
          files: "*.pyz"
          fail_on_unmatched_files: true

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Download web ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: sendit-web-linux-arm64
          path: sendit-android/app/src/main/assets/
      - name: Rename binary for APK
        run: |
          mv sendit-android/app/src/main/assets/sendit-web-linux-arm64 \
             sendit-android/app/src/main/assets/sendit-linux-arm64
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Generate Gradle wrapper (in temp dir to avoid project config)
        run: |
          mkdir -p /tmp/gradle-init
          echo "rootProject.name = 'init'" > /tmp/gradle-init/settings.gradle
          cd /tmp/gradle-init
          gradle wrapper --gradle-version 8.2
          cp -r gradle gradlew gradlew.bat /home/runner/work/sendit/sendit/sendit-android/
      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: sendit-android
      - name: Sign APK
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias sendit -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=sendit, OU=sendit, O=sendit, L=Unknown, ST=Unknown, C=US"
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore debug.keystore -storepass android \
            app/build/outputs/apk/release/app-release-unsigned.apk sendit
          ZIPALIGN=$(ls "$ANDROID_HOME"/build-tools/*/zipalign 2>/dev/null | head -1)
          "$ZIPALIGN" -v -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            sendit-android.apk
        working-directory: sendit-android
      - uses: softprops/action-gh-release@v1
        with:
          files: sendit-android/sendit-android.apk
          fail_on_unmatched_files: true
